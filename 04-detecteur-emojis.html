<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détecteur de Gestes Émojis</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
        }
        h1 {
            margin-bottom: 15px;
            font-size: 2rem;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Effet miroir */
            width: 640px;
            height: 480px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 5px;
            z-index: 10;
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1e293b;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            border: 1px solid #334155;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #334155;
            color: #ff007f;
        }
    </style>
</head>
<body>

    <h1>Traducteur de Gestes en Émojis</h1>

    <div class="container">
        <div id="loading">Initialisation du décodage de gestes...</div>
        <video id="webcam" style="display:none;" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <a href="../index.html" class="back-btn">← Retour au Hub</a>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingDiv = document.getElementById('loading');

        function onResults(results) {
            if (loadingDiv) loadingDiv.style.display = "none";

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let index = 0; index < results.multiHandLandmarks.length; index++) {
                    const landmarks = results.multiHandLandmarks[index];
                    const handedness = results.multiHandedness[index].label;
                    
                    // On dessine le squelette classique en rose/violet pour le style
                    canvasCtx.strokeStyle = "#ff007f"; 
                    canvasCtx.lineWidth = 3;
                    const connections = [
                        [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                        [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], [15, 16],
                        [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]
                    ];
                    for (const connection of connections) {
                        const pt1 = landmarks[connection[0]];
                        const pt2 = landmarks[connection[1]];
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(pt1.x * canvasElement.width, pt1.y * canvasElement.height);
                        canvasCtx.lineTo(pt2.x * canvasElement.width, pt2.y * canvasElement.height);
                        canvasCtx.stroke();
                    }

                    // --- ANALYSE DE L'ÉTAT DE CHAQUE DOIGT ---
                    // On vérifie si le doigt est ouvert (true) ou fermé (false)
                    const isIndexOpen = landmarks[8].y < landmarks[6].y;
                    const isMiddleOpen = landmarks[12].y < landmarks[10].y;
                    const isRingOpen = landmarks[16].y < landmarks[14].y;
                    const isPinkyOpen = landmarks[20].y < landmarks[18].y;
                    
                    // Pour le pouce, la logique dépend du miroir et de la main gauche/droite
                    let isThumbOpen = false;
                    if (handedness === "Left") {
                        isThumbOpen = landmarks[4].x > landmarks[3].x;
                    } else {
                        isThumbOpen = landmarks[4].x < landmarks[3].x;
                    }

                    // --- DÉTERMINATION DE L'ÉMOJI ---
                    let emoji = "❓"; // Émoji par défaut si le geste n'est pas reconnu

                    // Geste 1 : Main ouverte 🖐️ (Tous les doigts ouverts)
                    if (isThumbOpen && isIndexOpen && isMiddleOpen && isRingOpen && isPinkyOpen) {
                        emoji = "🖐️";
                    }
                    // Geste 2 : Poing fermé ✊ (Tous les doigts fermés)
                    else if (!isThumbOpen && !isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                        emoji = "✊";
                    }
                    // Geste 3 : Signe Peace ✌️ (Index et Majeur ouverts, les autres fermés)
                    else if (!isThumbOpen && isIndexOpen && isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                        emoji = "✌️";
                    }
                    // Geste 4 : Pouce levé 👍 (Pouce ouvert, tous les autres fermés)
                    else if (isThumbOpen && !isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                        emoji = "👍";
                    }
                    // Geste 5 : Signe Rock 🤘 (Index et Auriculaire ouverts, Majeur et Annulaire fermés)
                    else if (!isThumbOpen && isIndexOpen && !isMiddleOpen && !isRingOpen && isPinkyOpen) {
                        emoji = "🤘";
                    }

                    // --- AFFICHAGE DE L'ÉMOJI AU-DESSUS DE LA MAIN ---
                    canvasCtx.save();
                    // Inversion de la matrice pour écrire le texte à l'endroit malgré le miroir CSS
                    canvasCtx.translate(canvasElement.width, 0);
                    canvasCtx.scale(-1, 1);
                    
                    // Positionnement de l'émoji juste au-dessus du majeur (point 12)
                    const textX = canvasElement.width - (landmarks[12].x * canvasElement.width);
                    const textY = (landmarks[12].y * canvasElement.height) - 40;

                    canvasCtx.font = "70px sans-serif"; // Émoji bien gros
                    canvasCtx.textAlign = "center";
                    canvasCtx.fillText(emoji, textX, textY);
                    canvasCtx.restore();
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7, // Confiance un peu plus haute pour éviter les clignotements d'émojis
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
