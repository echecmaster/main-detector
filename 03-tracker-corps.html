<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détection Corporelle Totale</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: white;
        }
        h1 {
            margin-bottom: 15px;
            font-size: 2rem;
            color: #00faf2;
            text-shadow: 0 0 10px rgba(0, 250, 242, 0.3);
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Effet miroir */
            width: 640px;
            height: 480px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 5px;
            z-index: 10;
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1e293b;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            border: 1px solid #334155;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #334155;
            color: #00faf2;
        }
    </style>
</head>
<body>

    <h1>Analyse Posturale en Temps Réel</h1>

    <div class="container">
        <div id="loading">Analyse de ton environnement...</div>
        <video id="webcam" style="display:none;" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <a href="../index.html" class="back-btn">← Retour au Hub</a>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingDiv = document.getElementById('loading');

        function onResults(results) {
            if (loadingDiv) loadingDiv.style.display = "none";

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;

                // --- 1. CONFIGURATION DU DESSIN DES TRAITS (SQUELETTE) ---
                canvasCtx.strokeStyle = "#00faf2"; // Bleu cyan néon
                canvasCtx.lineWidth = 4;

                // Liste des connexions clés du corps humain
                const connections = [
                    // Épaules et hanches (Le buste)
                    [11, 12], [11, 23], [12, 24], [23, 24],
                    // Bras gauche
                    [11, 13], [13, 15],
                    // Bras droit
                    [12, 14], [14, 16],
                    // Jambe gauche
                    [23, 25], [25, 27], [27, 31],
                    // Jambe droite
                    [24, 26], [26, 28], [28, 32],
                    // Visage basique (Liaison yeux/oreilles/bouche)
                    [9, 10], [0, 4], [0, 1], [4, 6], [1, 3]
                ];

                for (const connection of connections) {
                    const pt1 = landmarks[connection[0]];
                    const pt2 = landmarks[connection[1]];

                    // On s'assure que l'IA est assez sûre d'elle pour dessiner le membre (visibilité > 0.5)
                    if (pt1.visibility > 0.5 && pt2.visibility > 0.5) {
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(pt1.x * canvasElement.width, pt1.y * canvasElement.height);
                        canvasCtx.lineTo(pt2.x * canvasElement.width, pt2.y * canvasElement.height);
                        canvasCtx.stroke();
                    }
                }

                // --- 2. DESSIN DES POINTS (ARTICULATIONS) ---
                for (const landmark of landmarks) {
                    if (landmark.visibility > 0.5) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(landmark.x * canvasElement.width, landmark.y * canvasElement.height, 5, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = "#FFD700"; // Points jaunes
                        canvasCtx.fill();
                    }
                }
            }
        }

        // Configuration de MediaPipe Pose
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            smoothSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
